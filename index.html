function buildExMap(programs) {
  const m = {};
  programs.forEach(p => (p.days||[]).forEach(d => d.exercises.forEach(e => { m[e.id] = e.name; })));
  return m;
}
function buildProgMap(programs) {
  const m = {}; programs.forEach(p => { m[p.id] = p.name; }); return m;
}
function buildExHistory(logs) {
  const result = {};
  Object.entries(logs).sort(([a],[b]) => a.localeCompare(b)).forEach(([date, log]) => {
    Object.entries(log.exercises||{}).forEach(([exId, exLog]) => {
      const kgs = (exLog.sets||[]).map(s => parseFloat(s.kg)).filter(v => !isNaN(v) && v > 0);
      if (!kgs.length) return;
      if (!result[exId]) result[exId] = [];
      result[exId].push({ date, kg: Math.max(...kgs) });
    });
  });
  return result;
}

function useSupabaseData(session) {
  const [programs, setProgramsState] = useState([]);
  const [logs, setLogsState] = useState({});
  const [activeProgId, setActiveProgIdState] = useState(null);
  const [loading, setLoading] = useState(true);
  const [syncStatus, setSyncStatus] = useState("idle");

  useEffect(() => {
    if (!session) { setLoading(false); return; }
    loadAll();
  }, [session?.user?.id]);

  async function loadAll() {
    setLoading(true);
    try {
      const [progsRes, logsRes, settRes] = await Promise.all([
        supabase.from("programs").select("*"),
        supabase.from("logs").select("*"),
        supabase.from("user_settings").select("*").maybeSingle(),
      ]);
      let progs = (progsRes.data || []).map(p => ({
        id: p.id, name: p.name, description: p.description||"", notes: p.notes||"",
        createdAt: p.created_at, days: p.days||[],
      }));
      if (progs.length === 0) {
        await supabase.from("programs").insert({
          id: DEFAULT_PROGRAM.id, name: DEFAULT_PROGRAM.name,
          description: DEFAULT_PROGRAM.description, notes: DEFAULT_PROGRAM.notes,
          created_at: DEFAULT_PROGRAM.createdAt, days: DEFAULT_PROGRAM.days,
        });
        progs = [DEFAULT_PROGRAM];
      }
      setProgramsState(progs);
      const logsObj = {};
      (logsRes.data||[]).forEach(l => {
        logsObj[l.date_key] = { progId: l.prog_id, exercises: l.exercises||{}, rest: l.rest };
      });
      setLogsState(logsObj);
      let apId = settRes.data?.active_prog_id || progs[0]?.id;
      if (!settRes.data) {
        await supabase.from("user_settings").insert({ active_prog_id: apId });
      }
      setActiveProgIdState(apId);
    } catch (e) { console.error("Load error", e); }
    setLoading(false);
  }

  const syncTimers = useRef({});

  function setPrograms(updater) {
    setProgramsState(prev => {
      const next = typeof updater === "function" ? updater(prev) : updater;
      schedulePush("programs", next, prev);
      return next;
    });
  }
  function setLogs(updater) {
    setLogsState(prev => {
      const next = typeof updater === "function" ? updater(prev) : updater;
      schedulePush("logs", next, prev);
      return next;
    });
  }
  function setActiveProgId(id) {
    setActiveProgIdState(id);
    setSyncStatus("syncing");
    supabase.from("user_settings")
      .upsert({ user_id: session.user.id, active_prog_id: id, updated_at: new Date().toISOString() })
      .then(({ error }) => setSyncStatus(error ? "error" : "idle"));
  }

  function schedulePush(kind, next, prev) {
    setSyncStatus("syncing");
    clearTimeout(syncTimers.current[kind]);
    syncTimers.current[kind] = setTimeout(() => pushChanges(kind, next, prev), 600);
  }

  async function pushChanges(kind, next, prev) {
    try {
      if (kind === "programs") {
        const nextIds = new Set(next.map(p => p.id));
        for (const p of prev) if (!nextIds.has(p.id)) {
          await supabase.from("programs").delete().eq("id", p.id);
        }
        for (const p of next) {
          const old = prev.find(x => x.id === p.id);
          if (!old || JSON.stringify(old) !== JSON.stringify(p)) {
            await supabase.from("programs").upsert({
              id: p.id, name: p.name, description: p.description||"", notes: p.notes||"",
              created_at: p.createdAt, days: p.days||[],
              updated_at: new Date().toISOString(),
            });
          }
        }
      } else if (kind === "logs") {
        const nextKeys = new Set(Object.keys(next));
        for (const k of Object.keys(prev)) if (!nextKeys.has(k)) {
          await supabase.from("logs").delete().eq("date_key", k);
        }
        for (const [k, v] of Object.entries(next)) {
          const old = prev[k];
          if (!old || JSON.stringify(old) !== JSON.stringify(v)) {
            await supabase.from("logs").upsert({
              date_key: k, prog_id: v.progId, exercises: v.exercises||{}, rest: v.rest||null,
              updated_at: new Date().toISOString(),
            });
          }
        }
      }
      setSyncStatus("idle");
    } catch (e) {
      console.error("Sync error", e);
      setSyncStatus("error");
    }
  }

  return { programs, setPrograms, logs, setLogs, activeProgId, setActiveProgId, loading, syncStatus };
}

function exportCSV(logs, programs) {
const exMap = buildExMap(programs), progMap = buildProgMap(programs);
const rows = [[“Fecha”,“Plan”,“Ejercicio”,“Serie”,“Kg”,“Reps”,“Sensación”,“Notas”,“Descanso(h)”,“Calidad descanso”,“Notas descanso”]];
Object.entries(logs).sort(([a],[b])=>a.localeCompare(b)).forEach(([date,log]) => {
const ds = new Date(date+“T12:00:00”).toLocaleDateString(“es-ES”,{weekday:“long”,day:“numeric”,month:“long”,year:“numeric”});
const pn = progMap[log.progId]||””;
const rest = log.rest||{};
const rq = rest.quality ? REST_QUALITY.find(q=>q.value===rest.quality)?.label : “”;
Object.entries(log.exercises||{}).forEach(([exId,exLog]) => {
const feel = exLog.feeling ? FEELINGS.find(f=>f.value===exLog.feeling)?.label : “”;
(exLog.sets||[]).forEach((s,i) => {
if (s.kg||s.reps) rows.push([ds,pn,exMap[exId]||exId,i+1,s.kg||””,s.reps||””,feel,exLog.notes||””,rest.hours||””,rq,rest.notes||””]);
});
});
});
const csv = rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(”,”)).join(”\n”);
const a = document.createElement(“a”);
a.href = URL.createObjectURL(new Blob([csv],{type:“text/csv;charset=utf-8;”}));
a.download = “entreno_jorge_montes.csv”; a.click();
}

function exportPDF(logs, programs) {
const exMap = buildExMap(programs), progMap = buildProgMap(programs);
const sorted = Object.keys(logs).sort((a,b)=>a.localeCompare(b));
let html = `<html><head><meta charset="utf-8"><style>body{font-family:'Segoe UI',sans-serif;color:#0f1c35;padding:28px;max-width:750px;margin:0 auto}h1{color:#1d72e8;font-size:20px}h2{font-size:13px;color:#1d72e8;border-bottom:2px solid #d6e4f7;padding-bottom:4px;margin-top:22px;text-transform:capitalize}h3{font-size:12px;margin:10px 0 3px}table{width:100%;border-collapse:collapse;font-size:11px}th{background:#e0edff;color:#1d72e8;padding:4px 6px;text-align:left;font-size:10px}td{padding:3px 6px;border-bottom:1px solid #d6e4f7}.rest{background:#e8fdf5;border-radius:4px;padding:5px 9px;font-size:11px;margin:4px 0}</style></head><body><h1>Entreno de Jorge Montes</h1><p style="color:#7a8faa;font-size:12px">${sorted.length} sesiones</p>`;
sorted.forEach(date => {
const log = logs[date];
const ds = new Date(date+“T12:00:00”).toLocaleDateString(“es-ES”,{weekday:“long”,day:“numeric”,month:“long”,year:“numeric”});
const pn = progMap[log.progId]||””;
html += `<h2>${ds}${pn?` <span style="font-size:10px;color:#7a8faa;font-weight:normal">· ${pn}</span>`:""}</h2>`;
const rest = log.rest;
if (rest) {
const rq = rest.quality ? REST_QUALITY.find(q=>q.value===rest.quality)?.label : “”;
html += `<div class="rest">🛌${rest.hours?` ${rest.hours}h`:""}${rq?` · ${rq}`:""}</div>`;
}
Object.entries(log.exercises||{}).forEach(([exId,exLog]) => {
const sd = (exLog.sets||[]).filter(s=>s.kg||s.reps);
if (!sd.length) return;
const feel = exLog.feeling ? FEELINGS.find(f=>f.value===exLog.feeling) : null;
html += `<h3>${exMap[exId]||exId}${feel?` <span style="font-weight:normal;color:#7a8faa">${feel.emoji} ${feel.label}</span>`:""}</h3>`;
html += `<table><tr><th>Serie</th><th>Kg</th><th>Reps</th></tr>`;
sd.forEach((s,i)=>{ html += `<tr><td>${i+1}</td><td>${s.kg||"—"}</td><td>${s.reps||"—"}</td></tr>`; });
html += `</table>`;
});
});
html += `</body></html>`;
const win = window.open(””,”_blank”);
win.document.write(html); win.document.close();
setTimeout(()=>win.print(),500);
}

function ImportButton({ onImport }) {
function handleFile(e) {
const file = e.target.files[0]; if (!file) return;
const r = new FileReader();
r.onload = ev => {
try {
const d = JSON.parse(ev.target.result);
if (d.logs && (d.programs||d.plan)) onImport(d);
else alert(“Archivo no válido.”);
} catch { alert(“Error al leer el archivo.”); }
};
r.readAsText(file); e.target.value = “”;
}
return (
<label style={sty.exportBtn}>
📥 Importar
<input type=“file” accept=”.json” onChange={handleFile} style={{display:“none”}} />
</label>
);
}

function RestTimer() {
const [seconds, setSeconds] = useState(0);
const [running, setRunning] = useState(false);
const [target, setTarget] = useState(90);
const intervalRef = useRef(null);
const audioRef = useRef(null);

useEffect(() => {
if (running) {
intervalRef.current = setInterval(() => {
setSeconds(s => {
const next = s + 1;
if (next === target) {
// beep
try {
const ctx = new (window.AudioContext||window.webkitAudioContext)();
const osc = ctx.createOscillator();
const gain = ctx.createGain();
osc.connect(gain); gain.connect(ctx.destination);
osc.frequency.value = 880; gain.gain.value = 0.3;
osc.start();
setTimeout(()=>{osc.stop();ctx.close();}, 400);
if (navigator.vibrate) navigator.vibrate([200,100,200]);
} catch(e) {}
}
return next;
});
}, 1000);
} else {
clearInterval(intervalRef.current);
}
return () => clearInterval(intervalRef.current);
}, [running, target]);

function start() { setSeconds(0); setRunning(true); }
function pause() { setRunning(false); }
function resume() { setRunning(true); }
function reset() { setRunning(false); setSeconds(0); }

const mm = String(Math.floor(seconds/60)).padStart(2,“0”);
const ss = String(seconds%60).padStart(2,“0”);
const overtime = seconds > target;
const remaining = Math.max(0, target - seconds);
const rmm = String(Math.floor(remaining/60)).padStart(2,“0”);
const rss = String(remaining%60).padStart(2,“0”);

return (
<div style={{background: overtime ? “#fff0ec” : C.tealL, border:`1.5px solid ${overtime ? C.orange : C.teal}`, borderRadius:10, padding:“10px 12px”, marginBottom:10}}>
<div style={{display:“flex”, alignItems:“center”, justifyContent:“space-between”, flexWrap:“wrap”, gap:8}}>
<div style={{display:“flex”, alignItems:“center”, gap:10}}>
<span style={{fontSize:11, color: overtime ? C.orange : C.teal, fontWeight:800, letterSpacing:“0.06em”}}>⏱ DESCANSO</span>
<span style={{fontSize:22, fontWeight:800, fontVariantNumeric:“tabular-nums”, color: overtime ? C.orange : C.teal}}>
{running || seconds>0 ? `${mm}:${ss}` : `${rmm}:${rss}`}
</span>
{overtime && <span style={{fontSize:10, color:C.orange, fontWeight:700}}>+{seconds-target}s</span>}
</div>
<div style={{display:“flex”, gap:5, alignItems:“center”}}>
<select value={target} onChange={e=>setTarget(parseInt(e.target.value))}
style={{background:”#fff”, border:`1px solid ${C.border}`, borderRadius:6, fontFamily:“inherit”, fontSize:11, fontWeight:700, padding:“3px 5px”, color:C.text}}>
<option value="30">30s</option>
<option value="45">45s</option>
<option value="60">1min</option>
<option value="90">1:30</option>
<option value="120">2min</option>
<option value="150">2:30</option>
<option value="180">3min</option>
<option value="240">4min</option>
<option value="300">5min</option>
</select>
{!running && seconds === 0 && (
<button onClick={start} style={{background:C.teal, color:”#fff”, border:“none”, borderRadius:7, fontFamily:“inherit”, fontWeight:800, fontSize:11, padding:“5px 11px”, cursor:“pointer”}}>▶ Iniciar</button>
)}
{running && (
<button onClick={pause} style={{background:”#fff”, color:C.teal, border:`1.5px solid ${C.teal}`, borderRadius:7, fontFamily:“inherit”, fontWeight:800, fontSize:11, padding:“4px 10px”, cursor:“pointer”}}>⏸</button>
)}
{!running && seconds > 0 && (
<button onClick={resume} style={{background:C.teal, color:”#fff”, border:“none”, borderRadius:7, fontFamily:“inherit”, fontWeight:800, fontSize:11, padding:“5px 11px”, cursor:“pointer”}}>▶</button>
)}
{seconds > 0 && (
<button onClick={reset} style={{background:“none”, border:`1.5px solid ${C.border}`, borderRadius:7, color:C.muted, fontFamily:“inherit”, fontSize:11, padding:“4px 9px”, cursor:“pointer”}}>↺</button>
)}
</div>
</div>
</div>
);
}

const exDone = Object.values(logs[d]?.exercises||{}).filter(e=>e.sets?.some(s=>s.kg!==””)).length;
const pName = progMap[logs[d]?.progId];
return (
<button key={d} onClick={()=>setSel(d)} style={{…sty.histItem,…(sel===d?sty.histItemActive:{})}}>
<div>
<div style={{fontSize:12,fontWeight:700,textTransform:“capitalize”,lineHeight:1.4}}>
{new Date(d+“T12:00:00”).toLocaleDateString(“es-ES”,{weekday:“long”,day:“numeric”,month:“long”,year:“numeric”})}
</div>
{pName && <div style={{fontSize:10,color:C.accent,fontWeight:700,marginTop:2}}>{pName}</div>}
</div>
<span style={{fontSize:11,color:C.teal,background:C.tealL,padding:“3px 9px”,borderRadius:20,fontWeight:700,flexShrink:0,marginLeft:8}}>{exDone} ej.</span>
</button>
);
})}
</div>
<div>{sel && logs[sel] && <LogDetail dateKey={sel} log={logs[sel]} exMap={exMap} progMap={progMap} />}</div>
</div>
)}
{tab===“charts” && (
<div>
{Object.keys(exHistory).length===0
? <div style={{textAlign:“center”,paddingTop:40}}><p style={{fontSize:36}}>📊</p><p style={{color:C.muted,fontSize:14,fontWeight:600}}>Registra pesos para ver la evolución.</p></div>
: Object.entries(exHistory).map(([exId,history]) => {
const maxKg = Math.max(…history.map(h=>h.kg));
const half = Math.floor(history.length/2);
let trend = null;
if (history.length>=4) {
const a1 = history.slice(0,half).reduce((s,h)=>s+h.kg,0)/half;
const a2 = history.slice(half).reduce((s,h)=>s+h.kg,0)/(history.length-half);
const d = a2-a1;
trend = d>0.5?{label:`+${d.toFixed(1)}kg media`,color:C.teal,arrow:“↑”}
:d<-0.5?{label:`${d.toFixed(1)}kg media`,color:C.orange,arrow:“↓”}
:{label:“Estable”,color:C.muted,arrow:“→”};
}
return (
<div key={exId} style={sty.detailCard}>
<div style={{display:“flex”,alignItems:“center”,justifyContent:“space-between”,marginBottom:3}}>
<p style={{fontSize:13,fontWeight:700,margin:0}}>{exMap[exId]||exId}</p>
{trend && <span style={{fontSize:11,fontWeight:700,color:trend.color,background:trend.color+“18”,padding:“2px 8px”,borderRadius:20}}>{trend.arrow} {trend.label}</span>}
</div>
<p style={{fontSize:11,color:C.muted,fontWeight:600,margin:“2px 0 0”}}>
Máximo: <span style={{color:C.accent}}>{maxKg}kg</span> · {history.length} sesiones
</p>
<MiniChart data={history} />
</div>
);
})
}
</div>
)}
{tab===“wellness” && <WellnessView logs={histLogs} sorted={filtered} />}
</div>
);
}

function LogDetail({ dateKey, log, exMap, progMap }) {
const rest = log.rest;
const pName = progMap[log.progId];
return (
<div>
<h3 style={{fontSize:14,fontWeight:800,color:C.accent,marginBottom:10,textTransform:“capitalize”}}>
{new Date(dateKey+“T12:00:00”).toLocaleDateString(“es-ES”,{weekday:“long”,day:“numeric”,month:“long”,year:“numeric”})}
</h3>
{pName && <div style={{fontSize:11,color:C.accent,fontWeight:700,background:C.accentL,display:“inline-block”,padding:“3px 10px”,borderRadius:20,marginBottom:12}}>📋 {pName}</div>}
{rest && (
<div style={sty.detailCard}>
<p style={{fontSize:13,fontWeight:700,marginBottom:7}}>🛌 Descanso</p>
{rest.hours && <p style={{fontSize:12,color:C.muted,marginBottom:3,fontWeight:600}}>Horas: {rest.hours}h</p>}
{rest.quality && <p style={{fontSize:12,color:C.muted,marginBottom:3,fontWeight:600}}>{REST_QUALITY.find(q=>q.value===rest.quality)?.emoji} {REST_QUALITY.find(q=>q.value===rest.quality)?.label}</p>}
{rest.notes && <p style={{fontSize:12,color:C.muted,fontStyle:“italic”,marginTop:5}}>{rest.notes}</p>}
</div>
)}
{Object.entries(log.exercises||{}).map(([exId,exLog]) => {
const feel = FEELINGS.find(f=>f.value===exLog.feeling);
return (
<div key={exId} style={sty.detailCard}>
<p style={{fontSize:13,fontWeight:700,marginBottom:7}}>{exMap[exId]||exId}</p>
{exLog.sets?.map((s,i)=>s.kg||s.reps
? <p key={i} style={{fontSize:12,color:C.muted,marginBottom:3,fontWeight:600}}>Serie {i+1}: {s.kg?`${s.kg}kg`:”—”} × {s.reps||”—”} reps</p>
: null
)}
{feel && <p style={{fontSize:12,color:C.muted,marginBottom:3,fontWeight:600}}>{feel.emoji} {feel.label}</p>}
{exLog.notes && <p style={{fontSize:12,color:C.muted,fontStyle:“italic”,marginTop:5}}>{exLog.notes}</p>}
</div>
);
})}
</div>
);
}

function WellnessView({ logs, sorted }) {
const data = […sorted].reverse().map(date => {
const log = logs[date];
const restQ = log.rest?.quality??null;
const restH = log.rest?.hours ? parseFloat(log.rest.hours) : null;
const feelings = Object.values(log.exercises||{}).map(e=>e.feeling).filter(Boolean);
const avgFeeling = feelings.length ? Math.round(feelings.reduce((a,b)=>a+b,0)/feelings.length*10)/10 : null;
return {date,restQ,restH,avgFeeling};
}).filter(d => d.restQ!==null||d.avgFeeling!==null);

if (data.length===0) return (
<div style={{textAlign:“center”,paddingTop:40}}>
<p style={{fontSize:36}}>🛌</p>
<p style={{color:C.muted,fontSize:14,fontWeight:600}}>Registra descanso y sensaciones para ver la correlación.</p>
</div>
);

return (
<div className="wg">
<div style={sty.detailCard}>
<p style={{fontSize:13,fontWeight:700,marginBottom:5}}>Descanso vs Sensación</p>
<p style={{fontSize:11,color:C.muted,marginBottom:6,fontWeight:600}}>
<span style={{color:C.accent}}>━</span> Descanso  
<span style={{color:C.teal}}>╌</span> Entreno
</p>
<WellnessChart data={data} />
</div>
<div style={sty.detailCard}>
<p style={{fontSize:13,fontWeight:700,marginBottom:7}}>Resumen por sesión</p>
<div style={{display:“flex”,flexDirection:“column”,gap:3}}>
<div style={{display:“grid”,gridTemplateColumns:“2fr 1fr 1fr 1fr”,gap:6,fontSize:10,color:C.muted,fontWeight:800,letterSpacing:“0.08em”,textTransform:“uppercase”,padding:“3px 0 5px”,borderBottom:`1.5px solid ${C.border}`}}>
<span>Fecha</span><span>Horas</span><span>Descanso</span><span>Entreno</span>
</div>
{[…data].reverse().map(d => {
const rq = d.restQ ? REST_QUALITY.find(q=>q.value===d.restQ) : null;
const fe = d.avgFeeling ? FEELINGS.find(f=>f.value===Math.round(d.avgFeeling)) : null;
return (
<div key={d.date} style={{display:“grid”,gridTemplateColumns:“2fr 1fr 1fr 1fr”,gap:6,alignItems:“center”,padding:“5px 0”,borderBottom:`1px solid ${C.border}`}}>
<span style={{fontSize:11,fontWeight:700,textTransform:“capitalize”}}>
{new Date(d.date+“T12:00:00”).toLocaleDateString(“es-ES”,{day:“numeric”,month:“short”})}
</span>
<span style={{fontSize:12}}>{d.restH?`${d.restH}h`:”—”}</span>
<span style={{fontSize:16}} title={rq?.label}>{rq?.emoji??”—”}</span>
<span style={{fontSize:16}} title={fe?.label}>{fe?.emoji??”—”}</span>
</div>
);
})}
</div>
</div>
</div>
);
}

function ConfigView({ programs, setPrograms, activeProgId, setActiveProgId, updateProg }) {
const [configProgId, setConfigProgId] = useState(activeProgId);
const [newProgName, setNewProgName] = useState(””);
const [newDayName, setNewDayName] = useState(””);
const [newExName, setNewExName] = useState(””);
const [newExSets, setNewExSets] = useState(“3”);
const [newExReps, setNewExReps] = useState(“8-12”);
const [configDayId, setConfigDayId] = useState(null);

const configProg = programs.find(p=>p.id===configProgId)||programs[0];
const plan = configProg?.days||[];
const activeDay = plan.find(d=>d.id===configDayId)||plan[0];

const cs = {
section: {background:C.surface, border:`1.5px solid ${C.border}`, borderRadius:14, padding:“14px”, marginBottom:14},
title: {fontSize:11, color:C.muted, letterSpacing:“0.1em”, textTransform:“uppercase”, fontWeight:800, marginBottom:10},
lbl: {fontSize:11, color:C.muted, fontWeight:700, textTransform:“uppercase”, letterSpacing:“0.08em”, marginBottom:7, marginTop:10},
};

function addProgram() {
if (!newProgName.trim()) return;
const id = “p_”+uid();
setPrograms(prev=>[…prev,{id,name:newProgName.trim(),description:””,notes:””,createdAt:todayKey(),days:[]}]);
setConfigProgId(id); setNewProgName(””);
}
function duplicateProgram(prog) {
const id = “p_”+uid();
setPrograms(prev=>[…prev,{…JSON.parse(JSON.stringify(prog)),id,name:prog.name+” (copia)”,createdAt:todayKey()}]);
setConfigProgId(id);
}
function removeProgram(id) {
if (programs.length<=1) return;
if (!confirm(”¿Eliminar este plan?”)) return;
const next = programs.filter(p=>p.id!==id);
setPrograms(next);
if (configProgId===id) setConfigProgId(next[0]?.id);
if (activeProgId===id) setActiveProgId(next[0]?.id);
}
function addDay() {
if (!newDayName.trim()) return;
const id = uid();
setPrograms(prev=>prev.map(p=>p.id===configProg.id?{…p,days:[…p.days,{id,name:newDayName.trim(),exercises:[]}]}:p));
setConfigDayId(id); setNewDayName(””);
}
function removeDay(id) {
if (plan.length<=1) return;
const next = plan.filter(d=>d.id!==id);
setPrograms(prev=>prev.map(p=>p.id===configProg.id?{…p,days:next}:p));
setConfigDayId(next[0]?.id);
}
function updateDay(dayId, patch) {
setPrograms(prev=>prev.map(p=>p.id===configProg.id?{…p,days:p.days.map(d=>d.id===dayId?{…d,…patch}:d)}:p));
}
function addExercise() {
if (!newExName.trim()||!activeDay) return;
const ex = {id:uid(),name:newExName.trim(),sets:parseInt(newExSets)||3,reps:newExReps.trim()||“8-12”};
setPrograms(prev=>prev.map(p=>p.id===configProg.id?{…p,days:p.days.map(d=>d.id===activeDay.id?{…d,exercises:[…d.exercises,ex]}:d)}:p));
setNewExName(””);
}
function removeExercise(exId) {
setPrograms(prev=>prev.map(p=>p.id===configProg.id?{…p,days:p.days.map(d=>d.id===activeDay.id?{…d,exercises:d.exercises.filter(e=>e.id!==exId)}:d)}:p));
}
function updateExercise(exId, field, val) {
setPrograms(prev=>prev.map(p=>p.id===configProg.id?{…p,days:p.days.map(d=>d.id===activeDay.id?{…d,exercises:d.exercises.map(e=>e.id===exId?{…e,[field]:val}:e)}:d)}:p));
}

return (
<div>
<h2 style={{fontSize:17,fontWeight:800,marginBottom:14}}>Configuración</h2>
<div style={cs.section}>
<p style={cs.title}>Mis planes</p>
<div className="pg" style={{marginBottom:10}}>
{programs.map(p => (
<div key={p.id} style={{…sty.progItem,…(configProgId===p.id?sty.progItemActive:{})}}>
<div style={{display:“flex”,alignItems:“center”,justifyContent:“space-between”,padding:“10px 12px 5px”,cursor:“pointer”}} onClick={()=>setConfigProgId(p.id)}>
<div style={{display:“flex”,alignItems:“center”,gap:6,flexWrap:“wrap”}}>
{activeProgId===p.id && <span style={{background:C.accent,color:”#fff”,fontSize:9,fontWeight:800,padding:“2px 7px”,borderRadius:20}}>ACTIVO</span>}
<span style={{fontSize:13,fontWeight:700}}>{p.name}</span>
</div>
<span style={{fontSize:10,color:C.muted,fontWeight:600}}>{p.createdAt}</span>
</div>
<div style={{display:“flex”,gap:5,padding:“0 12px 9px”,alignItems:“center”}}>
{activeProgId!==p.id && (
<button onClick={()=>setActiveProgId(p.id)} style={{background:C.accentL,border:`1.5px solid ${C.accent}`,borderRadius:7,color:C.accent,fontFamily:“inherit”,fontWeight:700,fontSize:11,padding:“4px 11px”,cursor:“pointer”}}>
Activar
</button>
)}
<button onClick={()=>duplicateProgram(p)} style={sty.removeBtn} title=“Duplicar”>⧉</button>
{programs.length>1 && <button onClick={()=>removeProgram(p.id)} style={sty.removeBtn} title=“Eliminar”>✕</button>}
</div>
</div>
))}
</div>
<div style={{display:“flex”,gap:6}}>
<input value={newProgName} onChange={e=>setNewProgName(e.target.value)}
placeholder=“Nombre del nuevo plan…” style={{…sty.input,flex:1}}
onKeyDown={e=>e.key===“Enter”&&addProgram()} />
<button onClick={addProgram} style={sty.addBtn}>+ Nuevo</button>
</div>
</div>
{configProg && (
<>
<div style={cs.section}>
<p style={cs.title}>Información del plan</p>
<p style={cs.lbl}>Nombre</p>
<input value={configProg.name} style={sty.input} onChange={e=>updateProg(configProg.id,{name:e.target.value})} />
<p style={cs.lbl}>Descripción</p>
<textarea value={configProg.description} style={sty.textarea} placeholder=“Objetivos, enfoque, duración prevista…”
onChange={e=>updateProg(configProg.id,{description:e.target.value})} />
<p style={cs.lbl}>Notas personales</p>
<textarea value={configProg.notes} style={{…sty.textarea,minHeight:70}} placeholder=“Cómo va yendo, ajustes…”
onChange={e=>updateProg(configProg.id,{notes:e.target.value})} />
</div>
<div style={cs.section}>
<p style={cs.title}>Sesiones del plan</p>
<div style={{display:“flex”,flexDirection:“column”,gap:6,marginBottom:10}}>
{plan.map(d => (
<div key={d.id} onClick={()=>setConfigDayId(d.id)}
style={{…sty.sessionItem,…((configDayId===d.id||(configDayId===null&&plan[0]?.id===d.id))?sty.sessionItemActive:{})}}>
<span style={{background:C.accent,color:”#fff”,fontWeight:800,fontSize:11,padding:“2px 9px”,borderRadius:7,minWidth:24,textAlign:“center”}}>{d.id}</span>
<span style={{flex:1,fontSize:13,fontWeight:600}}>{d.name}</span>
{plan.length>1 && <button style={sty.removeBtn} onClick={e=>{e.stopPropagation();removeDay(d.id);}}>✕</button>}
</div>
))}
</div>
<div style={{display:“flex”,gap:6}}>
<input value={newDayName} onChange={e=>setNewDayName(e.target.value)} placeholder=“Nueva sesión…”
style={{…sty.input,flex:1}} onKeyDown={e=>e.key===“Enter”&&addDay()} />
<button onClick={addDay} style={sty.addBtn}>+ Sesión</button>
</div>
</div>
{activeDay && (
<div style={cs.section}>
<p style={cs.title}>
Ejercicios de:{” “}
<input value={activeDay.name} onChange={e=>updateDay(activeDay.id,{name:e.target.value})}
style={{background:“none”,border:“none”,borderBottom:`2px solid ${C.accent}`,color:C.accent,fontFamily:“inherit”,fontSize:13,fontWeight:800,padding:“2px 4px”,outline:“none”}} />
</p>
{activeDay.exercises.length===0 && <p style={{color:C.muted,fontSize:12,marginBottom:7,fontWeight:600}}>Sin ejercicios todavía.</p>}
{activeDay.exercises.map(ex => (
<div key={ex.id} style={{display:“flex”,gap:6,alignItems:“center”,marginBottom:7,flexWrap:“wrap”}}>
<input value={ex.name} style={{…sty.input,flex:3}} onChange={e=>updateExercise(ex.id,“name”,e.target.value)} />
<input type=“number” min=“1” value={ex.sets} title=“Series”
style={{…sty.input,flex:1,textAlign:“center”}} onChange={e=>updateExercise(ex.id,“sets”,parseInt(e.target.value))} />
<input value={ex.reps} placeholder=“reps”
style={{…sty.input,flex:1,textAlign:“center”}} onChange={e=>updateExercise(ex.id,“reps”,e.target.value)} />
<button onClick={()=>removeExercise(ex.id)} style={sty.removeBtn}>✕</button>
</div>
))}
<div style={{display:“flex”,gap:6,marginTop:8}}>
<input value={newExName} onChange={e=>setNewExName(e.target.value)} placeholder=“Nuevo ejercicio…”
style={{…sty.input,flex:3}} onKeyDown={e=>e.key===“Enter”&&addExercise()} />
<input type=“number” min=“1” value={newExSets} onChange={e=>setNewExSets(e.target.value)}
style={{…sty.input,flex:1,textAlign:“center”}} title=“Series” />
<input value={newExReps} onChange={e=>setNewExReps(e.target.value)}
style={{…sty.input,flex:1,textAlign:“center”}} placeholder=“reps” />
<button onClick={addExercise} style={sty.addBtn}>+</button>
</div>
</div>
)}
</>
)}
</div>
);
}

ReactDOM.createRoot(document.getElementById(“root”)).render(<App />);
</script>

</body>
</html>
